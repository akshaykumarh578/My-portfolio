# .github/workflows/ci-cd.yml
# ──────────────────────────────────────────────────────────────────────────────
# CI/CD pipeline for Hithiaishini Portfolio
#
# Trigger:  every push / PR to main
# Jobs:
#   1. lint   — syntax check (fast fail)
#   2. test   — Jest integration tests against in-memory MongoDB
#   3. deploy — triggers Render deploy via API (auto-deploy is OFF on Render)
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   RENDER_SERVICE_ID  — from your Render service dashboard URL (srv-xxxx)
#   RENDER_API_KEY     — from Render Account Settings → API Keys
# ──────────────────────────────────────────────────────────────────────────────

name: CI / CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  WORKING_DIR: ./backend

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: "🔍 Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (node --check)
        run: |
          for f in server.js config/db.js models/Review.js routes/reviews.js; do
            echo "Checking $f…"
            node --check "$f"
          done

  # ── 2. Test ───────────────────────────────────────────────────────────────
  test:
    name: "🧪 Test"
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install test-only dep (mongodb-memory-server)
        run: npm install --save-dev mongodb-memory-server

      - name: Run Jest tests
        run: npm test
        env:
          NODE_ENV: test
          PORT: 5001

      - name: Upload test results (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/coverage/
          if-no-files-found: ignore

  # ── 3. Deploy to Render ───────────────────────────────────────────────────
  deploy:
    name: "🚀 Deploy to Render"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render deployment
        run: |
          echo "Triggering Render deployment…"
          RESPONSE=$(curl --silent --write-out "\nHTTP_STATUS:%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")

          echo "Response body: $BODY"
          echo "HTTP status:   $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "201" ]; then
            echo "❌ Render deploy API returned $HTTP_STATUS"
            exit 1
          fi

          echo "✅ Deploy triggered successfully on Render."

      - name: Poll Render for deploy status
        run: |
          echo "Polling Render for deploy completion…"
          MAX=30
          INTERVAL=10
          COUNT=0

          while [ $COUNT -lt $MAX ]; do
            RESPONSE=$(curl --silent \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              -H "Accept: application/json" \
              "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys?limit=1")

            STATUS=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          deploys = json.load(sys.stdin)
          print(deploys[0]['deploy']['status'] if deploys else 'unknown')
            ")

            echo "Deploy status: $STATUS  (check $COUNT/$MAX)"

            if [ "$STATUS" = "live" ]; then
              echo "✅ Deploy is live!"
              exit 0
            elif [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "build_failed" ]; then
              echo "❌ Deploy failed with status: $STATUS"
              exit 1
            fi

            COUNT=$((COUNT + 1))
            sleep $INTERVAL
          done

          echo "⚠️  Timed out waiting for deploy. Check Render dashboard."
          exit 1